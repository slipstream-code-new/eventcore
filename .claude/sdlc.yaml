version: "3.0"
harness:
  type: claude-code
  capabilities:
    subagents: true
    agent_teams: true
    skill_chaining: true
tdd:
  mode: automated
  strategy: agent-teams
  hooks_installed: false
  bypass_patterns:
    - "*.md"
    - "*.txt"
    - "*.rst"
    - ".github/**"
    - "*.tf"
    - "*.tfvars"
    - "*.hcl"
    - "Cargo.toml"
    - "package.json"
    - "pyproject.toml"
    - "*.yaml"
    - "*.yml"
    - "*.toml"
    - "*.json"
    - "Makefile"
    - "Dockerfile"
    - "docker-compose*.yml"
languages:
  rust:
    edition: "2024"
    test_runner: "cargo nextest run --workspace"
    test_single: "cargo nextest run --workspace -E 'test({name})'"
    formatter: "cargo fmt --all"
    linter: "cargo clippy --all-targets --all-features -- -D warnings"
skills_installed:
  - tdd
  - domain-modeling
  - code-review
  - architecture-decisions
  - debugging-protocol
  - ticket-triage
ensemble_team:
  preset: none
