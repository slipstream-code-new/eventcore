# SDLC Configuration
# Generated by /sdlc:setup v1.2.1

version: "1.2.1"

mode: traditional

git:
  workflow: branch
  require_clean: true

github:
  project: 11
  owner: jwilger

dot:
  prefix: EC

board:
  statuses:
    - Backlog
    - Ready
    - In progress
    - In review
    - Done

parallel_review: true

tdd:
  verbosity: brief
  bypass_patterns:
    - "*.md"
    - "*.txt"
    - "*.rst"
    - ".github/**"
    - "*.tf"
    - "*.tfvars"
    - "*.hcl"
    - "Cargo.toml"
    - "package.json"
    - "pyproject.toml"
    - "*.yaml"
    - "*.yml"
    - "*.toml"
    - "*.json"
    - "Makefile"
    - "Dockerfile"
    - "docker-compose*.yml"

languages:
  rust:
    edition: "2024"
    test_runner: "cargo nextest run --workspace"
    test_single: "cargo nextest run --workspace -E 'test({name})'"
    formatter: "cargo fmt --all"
    linter: "cargo clippy --all-targets --all-features -- -D warnings"
