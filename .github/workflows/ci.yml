name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_NEXTEST_VERSION: 0.9.115

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@${{ env.CARGO_NEXTEST_VERSION }}

      - name: Run tests
        env:
          POSTGRES_VERSION: "17"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: cargo nextest run --workspace --all-features

      - name: Run doctests
        env:
          POSTGRES_VERSION: "17"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: cargo test --doc --workspace --all-features

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features

  mutation:
    name: Mutation
    needs: [changes, test]
    if: >-
      needs.changes.outputs.rust == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.115

      - name: Run mutation testing
        id: mutants
        env:
          POSTGRES_VERSION: 17
          POSTGRES_HOST: postgres
          POSTGRES_PORT: "5432"
        run: |
          cargo mutants --workspace 2>&1 | tee mutation-output.txt
          MUTANTS_EXIT=${PIPESTATUS[0]}
          if [ "$MUTANTS_EXIT" -ne 0 ]; then
            echo "has_survivors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_survivors=false" >> "$GITHUB_OUTPUT"
          fi
          exit "$MUTANTS_EXIT"
        continue-on-error: true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutation-report
          path: |
            mutation-output.txt
            mutants.out/

      - name: Create issues for surviving mutants
        if: steps.mutants.outputs.has_survivors == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Group SURVIVED lines by source file
          declare -A by_file
          while IFS= read -r line; do
            file=$(printf '%s\n' "$line" | sed -n 's/^SURVIVED:[[:space:]]\+\(.*\.rs\):[0-9].*/\1/p')
            [ -z "$file" ] && continue
            by_file["$file"]+="${line}"$'\n'
          done < <(grep '^SURVIVED' mutation-output.txt || true)

          if [ "${#by_file[@]}" -eq 0 ]; then
            echo "No surviving mutants parsed from output"
            exit 0
          fi

          for file in "${!by_file[@]}"; do
            mutants="${by_file[$file]}"
            count=$(printf '%s' "$mutants" | grep -c '^SURVIVED' || true)

            mutant_list=$(printf '%s' "$mutants" | sed -e 's/^/- `/' -e 's/$/`/')

            title="mutant: surviving mutants in ${file}"

            body=""
            body+="## Surviving Mutants"$'\n\n'
            body+="Mutation testing found **${count} surviving mutant(s)** in "'`'"${file}"'`'"."$'\n'
            body+="Detected during release PR #${PR_NUMBER}."$'\n\n'
            body+="### Mutants"$'\n\n'
            body+="${mutant_list}"$'\n\n'
            body+="### What This Means"$'\n\n'
            body+="Each surviving mutant represents a code change that no test caught."$'\n'
            body+="This indicates a gap in test coverage that could allow bugs to ship undetected."$'\n\n'
            body+="### How to Fix"$'\n\n'
            body+="1. For each mutant, write a test that fails when the mutation is applied"$'\n'
            body+="2. Run "'`'"cargo mutants --file ${file}"'`'" locally to verify the fix"$'\n'
            body+="3. All mutants must be killed before the next release"$'\n\n'
            body+="### Context"$'\n\n'
            body+="- Release PR: #${PR_NUMBER}"$'\n'
            body+="- Full mutation report: see workflow artifacts"$'\n'

            gh issue create --title "$title" --body "$body" --label "P0-critical" --label "bug"

            echo "Created issue for ${count} surviving mutants in ${file}"
          done

      - name: Fail if mutants survived
        if: steps.mutants.outputs.has_survivors == 'true'
        run: |
          echo "::error::Mutation testing found surviving mutants. Issues have been created."
          echo "All mutants must be killed before this release can proceed."
          exit 1

  security-audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: cargo audit

  gate:
    name: CI Gate
    if: always()
    needs: [changes, test, format, clippy, mutation, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "format: ${{ needs.format.result }}"
          echo "clippy: ${{ needs.clippy.result }}"
          echo "mutation: ${{ needs.mutation.result }}"
          echo "security-audit: ${{ needs.security-audit.result }}"

          # Fail if any required job failed (skipped is OK)
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.format.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.mutation.result }}" \
            "${{ needs.security-audit.result }}"
          do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Required job reported: $result"
              exit 1
            fi
          done

          echo "All required jobs passed or were intentionally skipped."
