name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_NEXTEST_VERSION: 0.9.115

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly
        postgres:
          - 15
          - 16
          - 17
          - 18

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@${{ env.CARGO_NEXTEST_VERSION }}

      - name: Run tests
        env:
          POSTGRES_VERSION: ${{ matrix.postgres }}
        run: cargo nextest run --workspace --all-features

      - name: Run doctests
        env:
          POSTGRES_VERSION: ${{ matrix.postgres }}
        run: cargo test --doc --workspace --all-features

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features

  mutation:
    name: Mutation
    needs: [changes, test]
    if: >-
      needs.changes.outputs.rust == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.115

      - name: Run mutation testing
        id: mutants
        env:
          POSTGRES_VERSION: 17
        run: |
          cargo mutants --workspace 2>&1 | tee mutation-output.txt
          MUTANTS_EXIT=$?
          if [ $MUTANTS_EXIT -ne 0 ]; then
            echo "has_survivors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_survivors=false" >> "$GITHUB_OUTPUT"
          fi
          exit $MUTANTS_EXIT
        continue-on-error: true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutation-report
          path: |
            mutation-output.txt
            mutants.out/

      - name: Create issues for surviving mutants
        if: steps.mutants.outputs.has_survivors == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('mutation-output.txt', 'utf8');

            const survivors = output
              .split('\n')
              .filter(line => line.startsWith('SURVIVED'))
              .map(line => line.trim());

            if (survivors.length === 0) {
              console.log('No surviving mutants found in output');
              return;
            }

            const byFile = {};
            for (const line of survivors) {
              const match = line.match(/SURVIVED:\s+(.+?\.rs):\d+/);
              const file = match ? match[1] : 'unknown';
              if (!byFile[file]) byFile[file] = [];
              byFile[file].push(line);
            }

            const prNumber = context.payload.pull_request.number;

            for (const [file, mutants] of Object.entries(byFile)) {
              const mutantList = mutants
                .map(m => `- \`${m}\``)
                .join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `mutant: surviving mutants in ${file}`,
                labels: ['P0-critical', 'bug'],
                body: [
                  `## Surviving Mutants`,
                  ``,
                  `Mutation testing found **${mutants.length} surviving mutant(s)** in \`${file}\`.`,
                  `Detected during release PR #${prNumber}.`,
                  ``,
                  `### Mutants`,
                  ``,
                  mutantList,
                  ``,
                  `### What This Means`,
                  ``,
                  `Each surviving mutant represents a code change that no test caught.`,
                  `This indicates a gap in test coverage that could allow bugs to ship undetected.`,
                  ``,
                  `### How to Fix`,
                  ``,
                  `1. For each mutant, write a test that fails when the mutation is applied`,
                  `2. Run \`cargo mutants --file ${file}\` locally to verify the fix`,
                  `3. All mutants must be killed before the next release`,
                  ``,
                  `### Context`,
                  ``,
                  `- Release PR: #${prNumber}`,
                  `- Full mutation report: see workflow artifacts`,
                ].join('\n'),
              });

              console.log(`Created issue for ${mutants.length} surviving mutants in ${file}`);
            }

      - name: Fail if mutants survived
        if: steps.mutants.outputs.has_survivors == 'true'
        run: |
          echo "::error::Mutation testing found surviving mutants. Issues have been created."
          echo "All mutants must be killed before this release can proceed."
          exit 1

  security-audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: cargo audit

  gate:
    name: CI Gate
    if: always()
    needs: [changes, test, format, clippy, mutation, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "format: ${{ needs.format.result }}"
          echo "clippy: ${{ needs.clippy.result }}"
          echo "mutation: ${{ needs.mutation.result }}"
          echo "security-audit: ${{ needs.security-audit.result }}"

          # Fail if any required job failed (skipped is OK)
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.format.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.mutation.result }}" \
            "${{ needs.security-audit.result }}"
          do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Required job reported: $result"
              exit 1
            fi
          done

          echo "All required jobs passed or were intentionally skipped."
