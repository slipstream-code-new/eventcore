# Phase 1: Release PR Creation
# Runs on push to main (except when merging release PRs)
# Creates/updates release PR with version bumps and changelog
# Uses workspace version inheritance for lockstep versioning per ADR-025

name: Release PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Create/Update Release PR
    runs-on: ubuntu-24.04
    # Skip if this is a release PR merge (to avoid infinite loops)
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for changelog generation
          # Use PAT to allow release PR to trigger CI workflows
          # The auto-provided GITHUB_TOKEN does not trigger downstream runs
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Configure git identity
        env:
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
          RELEASE_BOT_EMAIL: ${{ vars.RELEASE_BOT_EMAIL }}
        run: |
          git config --global user.name "${RELEASE_BOT_NAME:-release-plz-bot}"
          git config --global user.email "${RELEASE_BOT_EMAIL:-release-plz-bot@noreply.johnwilger.com}"

      - name: Create/update release PR
        env:
          # Use PAT instead of GITHUB_TOKEN to trigger CI on release PR
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          GIT_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          # Credentials for release-plz's temp-clone git pushes (checkout@v6
          # scopes its own credentials to the workspace gitdir)
          . ./.forgejo/scripts/configure-release-plz-git-auth.sh

          # release-plz creates/updates PR with version bumps and changelog
          # Lockstep versioning enforced via workspace version inheritance
          # (see workspace Cargo.toml and ADR-025)
          release-plz release-pr \
            --git-token "$GITHUB_TOKEN" \
            --forge gitea \
            --config ./release-plz.toml
