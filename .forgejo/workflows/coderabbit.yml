name: CodeRabbit Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: CodeRabbit AI Review
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # CLI compares working tree against the base branch

      - name: Fetch base branch as local ref
        # The CLI runs `git diff main...HEAD`, which needs `main` as a
        # local branch — actions/checkout only sets up the PR HEAD, so
        # we materialize the base branch here.
        run: git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}"

      - name: Install CodeRabbit CLI
        run: |
          set -euo pipefail
          curl -fsSL https://cli.coderabbit.ai/install.sh | sh
          # Installer drops the binary into ~/.local/bin
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Authenticate
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: coderabbit auth login --api-key "$CODERABBIT_API_KEY"

      - name: Run review (plain output)
        id: review
        env:
          NO_COLOR: "1"
        run: |
          set -eo pipefail
          rc=0
          coderabbit --plain --base "${{ github.base_ref }}" \
            > review.txt 2>&1 || rc=$?
          # Strip any stray ANSI escapes just in case
          sed -i 's/\x1b\[[0-9;]*[a-zA-Z]//g' review.txt
          cat review.txt
          if [ "$rc" -ne 0 ]; then
            echo "CodeRabbit CLI exited $rc; skipping comment."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jq for comment posting
        if: steps.review.outputs.ok == 'true'
        run: |
          set -eo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y --no-install-recommends jq
          fi

      - name: Post review comment to PR
        if: steps.review.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          if [ ! -s review.txt ]; then
            echo "CodeRabbit produced no output; skipping comment."
            exit 0
          fi

          body=$(printf '## CodeRabbit Review\n\n```\n%s\n```\n' "$(cat review.txt)")
          payload=$(jq -n --arg b "$body" '{body: $b}')

          curl -fsSL -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "${SERVER}/api/v1/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -d "$payload"
